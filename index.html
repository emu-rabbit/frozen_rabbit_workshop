        <div style="font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.8;">
          <h1>冷凍兔肉的工坊 — FFXIV 能工巧匠備料管理工具</h1>
          <p>
            <strong>冷凍兔肉的工坊</strong>是一個專為 <strong>FF14 / FFXIV（最終幻想14）</strong> 玩家設計的免費線上工具，
            特別適合 <strong>能工巧匠（巧匠）</strong> 進行大量備料、製作規劃與開銷管理。
          </p>
          <h2>主要功能</h2>
          <ul>
            <li>🛠️ <strong>備料台</strong>：輸入製作清單，系統自動拆解所有配方層級所需的素材。</li>
            <li>💰 <strong>市場即時價格</strong>：串接 Universalis API 查詢各伺服器最新市場板價格，估算總備料成本。</li>
            <li>📋 <strong>待辦清單生成</strong>：一鍵依購買、採集、製作分類生成行動清單，含 NPC 座標與採集地點。</li>
            <li>⏰ <strong>限時採集節點</strong>：顯示 ET 時間與鬧鐘巨集，再也不會錯過限時素材。</li>
            <li>🌐 <strong>多語系支援</strong>：繁體中文、簡體中文、English、日本語。</li>
          </ul>
          <h2>資料來源</h2>
          <p>物品、配方與採集資料由 <a href="https://ffxivteamcraft.com">Teamcraft</a> 提供；市場價格由 <a href="https://universalis.app">Universalis</a> 提供；圖示由 XIVAPI 提供。</p>
          <p><em>本網站需要啟用 JavaScript 才能正常使用。</em></p>
